<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pessoal | SENAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                    <span>AdminPro</span>
                </div>
                <button class="sidebar-toggle" id="sidebar-toggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li class="active">
                        <a href="#">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>

                    <li class="active">
                        <a href="#">
                            <i class="fas fa-users"></i>
                            <span>Usuários</span>
                        </a>
                    </li>

                    <li class="active">
                        <a href="#">
                            <i class="fas fa-shopping-cart"></i>
                            <span>Vendas</span>
                        </a>
                    </li>

                    <li class="active">
                        <a href="#">
                            <i class="fas fa-chart-bar"></i>
                            <span>Relatórios</span>
                        </a>
                    </li>

                    <li class="active">
                        <a href="#">
                            <i class="fas fa-cog"></i>
                            <span>Configurações</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <a href="#">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Sair</span>
                </a>
            </div>
        </aside>
        <!-- Conteúdo Principal -->
         <div class="mais-content">
            <header class="topbar">
                <div class="search-area">
                  <i class="fas fa-search"></i>
                  <input type="text" placeholder="Pesquisa....">
                </div>

                <div class="user-area">
                    <button class="dark-mode-toogle" id="darkModeToggle">
                        <i class="fas fa-moon"></i>
                    </button>

                    <div class="notification">
                        <i class=" fas fa-bell"></i>
                        <span class="badge">67</span>
                    </div>
 
                    <div class="user-profile">
                        <img src="https://i.pinimg.com/474x/f7/9c/59/f79c59dcf314c3d72d435c4ca234b9d1.jpg" alt="">
                        <span>Matheus Henrique</span>
                        <i class="fe-chervron-down"></i>
                    </div>
                </div>
            </header>
            
            <main>
                <div class="page-header">
                    <h1>Dashboard</h1>
                    <p>Bem-Vindo de volta, Matheus! Aqui está o resumo do seu negócio</p>
                </div>

                <div class="cards-grid">
                       <div class="card">
                        <div class="card-icon">
                            <i class="fas fa-dollar-sign"></i>
                        </div>
                        <div class="card-info">
                            <h3>Faturamento</h3>
                            <p class="value">R$ 100.843.982.1</p>
                            <span class="trend up">+101,0%</span>
                        </div>

                        <div class="card">
                        <div class="card-icon">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="card-info">
                            <h3>Clientes</h3>
                            <p class="value">879.921</p>
                            <span class="trend up">+11,0%</span>
                        </div>

                        <div class="card">
                        <div class="card-icon">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <div class="card-info">
                            <h3>Vendas</h3>
                            <p class="value">569.214</p>
                            <span class="trend up">+5,3%</span>

                            <div class="card">
                        <div class="card-icon">
                            <i class="fas fa-star"></i>
                        </div>
                        <div class="card-info">
                            <h3>Conversão</h3>
                            <p class="value">43,8%</p>
                            <span class="trend up"></span>
                        </div>
                        </div>
                    </div>
                </div>
            </main>
         </div> 
    </div>    
</body>
</html>
